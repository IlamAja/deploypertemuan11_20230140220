<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen flex items-center justify-center p-4">

<div class="bg-white border border-zinc-200 shadow-xs rounded-2xl p-8 max-w-md w-full">
    <div class="mb-6 text-center">
        <h2 class="text-2xl font-bold tracking-tight text-zinc-900">Buat Akun Baru</h2>
        <p class="text-sm text-zinc-500 mt-1">Silakan isi data diri kamu untuk mendaftar</p>
    </div>

    <form th:action="@{/register}" method="post" th:object="${request}" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Username</label>
            <input type="text" th:field="*{username}" placeholder="Masukkan username" class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-hidden focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition" required />
        </div>

        <div>
            <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Password</label>
            <input type="password" th:field="*{password}" placeholder="••••••••" class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-hidden focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition" required />
        </div>

        <div>
            <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
            <input type="text" th:field="*{nama}" placeholder="Nama lengkap kamu" class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-hidden focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition" />
        </div>

        <div>
            <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Alamat</label>
            <input type="text" th:field="*{alamat}" placeholder="Alamat rumah" class="w-full bg-white border border-zinc-200 rounded-lg px-3.5 py-2 text-sm text-zinc-900 placeholder-zinc-400 focus:outline-hidden focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition" />
        </div>

        <div class="pt-2">
            <button type="submit" class="w-full bg-zinc-950 hover:bg-zinc-800 text-white font-medium text-sm py-2.5 px-4 rounded-lg shadow-sm transition cursor-pointer">
                Daftar Sekarang
            </button>
        </div>
    </form>

    <div class="mt-6 text-center text-xs text-zinc-500">
        Sudah punya akun? <a th:href="@{/login}" class="text-zinc-950 font-medium hover:underline">Masuk di sini</a>
    </div>
</div>

</body>
</html>
